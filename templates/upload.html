<!DOCTYPE html>
<html>
<head>
    <title>Upload Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#11998e,#38ef7d);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .upload-card{
            width:500px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            color:#11998e;
            font-weight:bold;
            margin-bottom:25px;
        }

        .form-control,
        .form-select{
            border-radius:10px;
        }

        .btn-upload{
            width:100%;
            background:#11998e;
            color:white;
            border:none;
            padding:12px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
        }

        .btn-upload:hover{
            background:#0d7d73;
        }
    </style>
</head>

<body>

<div class="upload-card">

    <h2>📤 Upload Document</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Choose File</label>
            <input type="file"
                   name="file"
                   class="form-control"
                   required>
        </div>

        <div class="mb-4">
            <label class="form-label">Category</label>

            <select name="category" class="form-select">
                <option value="1">📜 Certificates</option>
                <option value="2">📚 Notes</option>
                <option value="3">🔐 Passwords</option>
                <option value="4">📄 Personal Documents</option>
            </select>
        </div>

        <button type="submit" class="btn-upload">
            Upload File
        </button>

    </form>

</div>

</body>
</html>
