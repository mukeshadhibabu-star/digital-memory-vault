<!DOCTYPE html>
<html>
<head>
    <title>Upload Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#11998e,#38ef7d);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .upload-card{
            width:500px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            color:#11998e;
            font-weight:bold;
            margin-bottom:25px;
        }

        .form-control,
        .form-select{
            border-radius:10px;
        }

        .btn-upload{
            width:100%;
            background:#11998e;
            color:white;
            border:none;
            padding:12px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
        }

        .btn-upload:hover{
            background:#0d7d73;
        }
    </style>
</head>

<body>

<div class="upload-card">

    <h2>📤 Upload Document</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Choose File</label>

            <input type="file"
                   name="file"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>

            <select name="category"
                    id="category"
                    class="form-select"

                <option value="1">📜 Certificates</option>
                <option value="2">📚 Notes</option>
                <option value="3">📝 Assignments</option>
                <option value="4">💻 Projects</option>
                <option value="5">📄 Resume / CV</option>
                <option value="6">📚 Study Materials</option>
                <option value="7">📑 Question Papers</option>
                <option value="8">📷 Photos</option>
                <option value="9">🎥 Videos</option>
                <option value="10">🎵 Audio Files</option>
                <option value="11">🆔 ID Proof</option>
                <option value="12">🏦 Bank Documents</option>
                <option value="13">💼 Internship Documents</option>
                <option value="14">📂 Personal Documents</option>
                <option value="15">🧾 Bills</option>
                <option value="16">🏆 Certificates & Awards</option>
                <option value="17">🔐 Password Backup</option>
                <option value="18">📦 Others</option>

            </select>
        </div>



        <button type="submit" class="btn-upload">
            📤 Upload File
        </button>

    </form>

</div>

<script>
function showCustomCategory() {

    let category = document.getElementById("category").value;
    let customBox = document.getElementById("customBox");

    if(category == "19"){
        customBox.style.display = "block";
    } else {
        customBox.style.display = "none";
    }
}
</script>

</body>
</html>
