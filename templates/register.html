<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#00B4DB,#0083B0);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-card{
            width:450px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            color:#0083B0;
            font-weight:bold;
            margin-bottom:25px;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-register{
            width:100%;
            background:#0083B0;
            color:white;
            border:none;
            padding:12px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
        }

        .btn-register:hover{
            background:#006b8f;
        }
    </style>
</head>

<body>

<div class="register-card">

    <h2>📝 Create Account</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text"
                   name="name"
                   class="form-control"
                   placeholder="Enter your name"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter your email"
                   required>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Create a password"
                   required>
        </div>

        <button type="submit" class="btn-register">
            Register
        </button>

    </form>

</div>

</body>
</html>
