<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:400px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        .login-title{
            text-align:center;
            color:#2a5298;
            font-weight:bold;
            margin-bottom:25px;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-login{
            width:100%;
            border-radius:10px;
            padding:12px;
            font-size:18px;
            font-weight:bold;
        }

        .logo{
            font-size:50px;
            text-align:center;
            margin-bottom:10px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">🔐</div>

    <h2 class="login-title">
        Digital Memory Vault
    </h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter your email"
                   required>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter your password"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary btn-login">
            Login
        </button>

    </form>

</div>

</body>
</html>
