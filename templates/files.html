<!DOCTYPE html>
<html>
<head>
    <title>My Files</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            font-family: Arial, sans-serif;
        }

        .main-card{
            background: rgba(255,255,255,0.95);
            border-radius:20px;
            padding:30px;
            margin-top:40px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#4a4a4a;
            margin-bottom:25px;
            font-weight:bold;
        }

        .search-box{
            border-radius:12px;
            padding:10px;
        }

        .table{
            margin-top:20px;
        }

        .table thead{
            background:#4f46e5;
            color:white;
        }

        .table tbody tr:hover{
            background:#f3f4f6;
            transition:0.3s;
        }

        .btn{
            border-radius:10px;
            font-weight:bold;
        }

        .search-btn{
            border-radius:12px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="main-card">

        <h2>📁 My Files</h2>

        <form method="GET" class="row g-2 mb-4">

            <div class="col-md-10">
                <input type="text"
                       name="search"
                       class="form-control search-box"
                       placeholder="🔍 Search files">
            </div>

            <div class="col-md-2">
                <button type="submit"
                        class="btn btn-primary w-100 search-btn">
                    Search
                </button>
            </div>

        </form>

        <table class="table table-hover table-bordered align-middle">

            <thead>
                <tr>
                    <th>File Name</th>
                    <th>Category</th>
                    <th>Open</th>
                    <th>Delete</th>
                </tr>
            </thead>

            <tbody>

            {% for file in files %}
            <tr>

                <td>{{ file[1] }}</td>

                <td>
                    <span class="badge bg-info">
                        {{ file[2] }}
                    </span>
                </td>

                <td>
                    <a href="/view/{{ file[0] }}"
                       class="btn btn-success">
                       📂 Open
                    </a>
                </td>

                <td>
                    <a href="/delete/{{ file[0] }}"
                       class="btn btn-danger"
                       onclick="return confirm('Are you sure you want to delete this file?')">
                       🗑 Delete
                    </a>
                </td>

            </tr>
            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
