<!DOCTYPE html>
<html>
<head>
    <title>Activity Logs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .login{
            background:#0d6efd;
            color:white;
            padding:6px 12px;
            border-radius:15px;
            font-weight:bold;
        }

        .upload{
            background:#198754;
            color:white;
            padding:6px 12px;
            border-radius:15px;
            font-weight:bold;
        }
    </style>

</head>
<body>

<h2>Activity Logs</h2>

<table class="table table-bordered">

    <tr>
        <th>Action</th>
        <th>Time</th>
    </tr>

    {% for log in logs %}

    <tr>

        <td>

            {% if log[2] == 'User Login' %}
                <span class="login">{{ log[2] }}</span>

            {% elif log[2] == 'Uploaded File' %}
                <span class="upload">{{ log[2] }}</span>

            {% else %}
                {{ log[2] }}
            {% endif %}

        </td>

        <td>{{ log[3] }}</td>

    </tr>

    {% endfor %}

</table>

</body>
</html>
