<!DOCTYPE html>
<html>
<head>
    <title>Password Vault</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#cb2d3e,#ef473a);
            min-height:100vh;
        }

        .vault-card{
            max-width:500px;
            margin:60px auto;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            color:#cb2d3e;
            font-weight:bold;
            margin-bottom:25px;
        }

        .form-control{
            border-radius:10px;
        }

        .btn-save{
            width:100%;
            background:#cb2d3e;
            color:white;
            border:none;
            padding:12px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
        }

        .btn-save:hover{
            background:#a71d2a;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="vault-card">

        <h2>🔐 Password Vault</h2>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Website</label>
                <input type="text"
                       name="website"
                       class="form-control"
                       placeholder="Enter website">
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username">
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password">
            </div>

            <button type="submit" class="btn-save">
                💾 Save Password
            </button>

        </form>

    </div>

</div>

</body>
</html>
